[tool.isort]
known_lue = "lue, lue_test"
lines_after_imports = 2
sections = "FUTURE,STDLIB,THIRDPARTY,LUE,FIRSTPARTY,LOCALFOLDER"
profile = "black"

[tool.codespell]
skip = "*.cpp,*.cpp.in,*.hpp,*.hpp.in,*.tex,*_test.py,pyproject.toml"
ignore-words-list = "nD"

[tool.typos]
default.extend-ignore-identifiers-re = [
    ".*_FPR_.*",
    "InputElemenT",
    "nd",
    "ND",
]
default.extend-ignore-words-re = [
    "PN",
]
